<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekly Review Checklist</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=Inconsolata:wght@400;500&family=Lato:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4f2ee;
    --bg2: #ffffff;
    --bg3: #f0eeea;
    --bg4: #e8e5df;
    --border: rgba(0,0,0,0.08);
    --border2: rgba(0,0,0,0.16);
    --text: #1a1814;
    --text2: #4a4740;
    --text3: #9a9690;
    --teal: #0a7c60;
    --teal-dim: rgba(10,124,96,0.08);
    --purple: #4a3b9c;
    --purple-dim: rgba(74,59,156,0.08);
    --amber: #8a5c0a;
    --amber-dim: rgba(138,92,10,0.08);
    --coral: #8a2e1a;
    --coral-dim: rgba(138,46,26,0.08);
    --done-bg: rgba(10,124,96,0.05);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Lato', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    padding: 32px 20px 60px;
  }

  .app { max-width: 680px; margin: 0 auto; }

  /* Header */
  .app-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 32px;
  }
  .app-title {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--text);
  }
  .app-title span { color: var(--teal); }
  .week-label {
    font-family: 'Inconsolata', monospace;
    font-size: 12px;
    color: var(--text3);
    letter-spacing: 0.08em;
  }

  /* Progress bar */
  .progress-wrap {
    margin-bottom: 28px;
  }
  .progress-meta {
    display: flex;
    justify-content: space-between;
    margin-bottom: 8px;
    font-family: 'Inconsolata', monospace;
    font-size: 11px;
    color: var(--text3);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .progress-meta .count { color: var(--teal); font-size: 13px; }
  .progress-track {
    height: 3px;
    background: var(--bg4);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--teal);
    border-radius: 2px;
    transition: width 0.4s ease;
    width: 0%;
  }

  /* Step card */
  .step-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 12px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .step-card.done {
    background: var(--done-bg);
    border-color: rgba(45,204,160,0.2);
  }

  .step-header {
    display: grid;
    grid-template-columns: 48px 1fr auto;
    align-items: center;
    padding: 18px 20px;
    cursor: pointer;
    user-select: none;
    gap: 0 14px;
  }
  .step-header:hover { background: rgba(255,255,255,0.02); }

  .step-num-badge {
    width: 36px; height: 36px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 700;
    flex-shrink: 0;
    border: 1.5px solid;
    transition: all 0.25s;
  }
  .s1 .step-num-badge { color: var(--teal);   border-color: var(--teal);   background: var(--teal-dim); }
  .s2 .step-num-badge { color: var(--purple); border-color: var(--purple); background: var(--purple-dim); }
  .s3 .step-num-badge { color: var(--amber);  border-color: var(--amber);  background: var(--amber-dim); }
  .s4 .step-num-badge { color: var(--coral);  border-color: var(--coral);  background: var(--coral-dim); }

  .step-card.done .step-num-badge {
    background: rgba(10,124,96,0.12) !important;
    border-color: var(--teal) !important;
    color: var(--teal) !important;
  }
  .step-card.done .step-num-badge::after {
    content: '✓';
    font-size: 14px;
    font-family: 'Lato', sans-serif;
  }
  .step-card.done .step-num-inner { display: none; }

  .step-info {}
  .step-tag-label {
    font-family: 'Inconsolata', monospace;
    font-size: 9.5px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    margin-bottom: 3px;
  }
  .s1 .step-tag-label { color: var(--teal); }
  .s2 .step-tag-label { color: var(--purple); }
  .s3 .step-tag-label { color: var(--amber); }
  .s4 .step-tag-label { color: var(--coral); }
  .step-card.done .step-tag-label { color: var(--text3); }

  .step-title-text {
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    transition: color 0.2s;
  }
  .step-card.done .step-title-text { color: var(--text3); text-decoration: line-through; }

  .chevron {
    color: var(--text3);
    font-size: 16px;
    transition: transform 0.2s;
    flex-shrink: 0;
  }
  .step-card.open .chevron { transform: rotate(180deg); }

  /* Step body (expanded) */
  .step-body {
    display: none;
    padding: 0 20px 20px 82px;
  }
  .step-card.open .step-body { display: block; }

  .step-desc-text {
    font-size: 13px;
    color: var(--text2);
    line-height: 1.7;
    margin-bottom: 16px;
  }
  .step-desc-text code {
    font-family: 'Inconsolata', monospace;
    font-size: 11.5px;
    background: var(--bg4);
    padding: 1px 6px;
    border-radius: 3px;
    color: var(--text);
  }
  .step-desc-text a {
    color: var(--teal);
    text-decoration: none;
    border-bottom: 1px solid rgba(45,204,160,0.3);
  }

  /* Subtasks */
  .subtasks { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
  .subtask {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    background: var(--bg3);
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .subtask:hover { background: var(--bg4); }
  .subtask.checked { background: rgba(10,124,96,0.06); }

  .subtask-box {
    width: 16px; height: 16px;
    border: 1.5px solid var(--text3);
    border-radius: 3px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .subtask.checked .subtask-box {
    background: var(--teal);
    border-color: var(--teal);
  }
  .subtask.checked .subtask-box::after {
    content: '✓';
    font-size: 10px;
    color: #0f0e0c;
    font-weight: 700;
  }
  .subtask-label {
    font-size: 12.5px;
    color: var(--text2);
    transition: color 0.15s;
  }
  .subtask.checked .subtask-label {
    color: var(--text3);
    text-decoration: line-through;
  }

  /* Notes area */
  .notes-label {
    font-family: 'Inconsolata', monospace;
    font-size: 9.5px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 6px;
  }
  .notes-area {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    color: var(--text2);
    font-family: 'Lato', sans-serif;
    font-size: 12.5px;
    font-weight: 300;
    line-height: 1.6;
    resize: vertical;
    min-height: 68px;
    outline: none;
    transition: border-color 0.2s;
  }
  .notes-area:focus { border-color: var(--border2); }
  .notes-area::placeholder { color: var(--text3); }

  /* Mark done button */
  .mark-done-btn {
    margin-top: 14px;
    padding: 8px 18px;
    border-radius: 5px;
    border: 1.5px solid;
    background: transparent;
    font-family: 'Inconsolata', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }
  .s1 .mark-done-btn { color: var(--teal);   border-color: var(--teal); }
  .s2 .mark-done-btn { color: var(--purple); border-color: var(--purple); }
  .s3 .mark-done-btn { color: var(--amber);  border-color: var(--amber); }
  .s4 .mark-done-btn { color: var(--coral);  border-color: var(--coral); }
  .mark-done-btn:hover { background: rgba(255,255,255,0.05); }
  .step-card.done .mark-done-btn {
    color: var(--text3);
    border-color: var(--text3);
  }

  /* Completion banner */
  .completion-banner {
    display: none;
    background: rgba(10,124,96,0.08);
    border: 1px solid rgba(10,124,96,0.2);
    border-radius: 10px;
    padding: 20px 24px;
    text-align: center;
    margin-bottom: 12px;
  }
  .completion-banner.show { display: block; }
  .completion-emoji { font-size: 28px; margin-bottom: 8px; }
  .completion-msg {
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 600;
    color: var(--teal);
    margin-bottom: 4px;
  }
  .completion-sub { font-size: 12px; color: var(--text2); }

  /* Reset */
  .reset-btn {
    display: block;
    width: 100%;
    margin-top: 20px;
    padding: 10px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text3);
    font-family: 'Inconsolata', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }
  .reset-btn:hover { border-color: var(--border2); color: var(--text2); }

  .popout-btn {
    display: block;
    width: 100%;
    margin-top: 8px;
    padding: 10px;
    background: var(--teal);
    border: none;
    border-radius: 6px;
    color: #fff;
    font-family: 'Inconsolata', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .popout-btn:hover { opacity: 0.85; }
</style>
</head>
<body>

<div class="app">
  <div class="app-header">
    <div class="app-title">Weekly <span>Review</span></div>
    <div class="week-label" id="week-label">Loading...</div>
  </div>

  <div class="progress-wrap">
    <div class="progress-meta">
      <span>Progress</span>
      <span class="count" id="prog-count">0 / 4 steps</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="prog-fill"></div>
    </div>
  </div>

  <div class="completion-banner" id="completion-banner">
    <div class="completion-emoji">🎉</div>
    <div class="completion-msg">Week review complete!</div>
    <div class="completion-sub">Great records → great analysis → great lab meetings.</div>
  </div>

  <!-- Steps will be rendered by JS -->
  <div id="steps-container"></div>

  <button class="reset-btn" onclick="resetAll()">↺ &nbsp; Reset for new week</button>
  <button class="popout-btn" onclick="window.open('WeekReview_QuickRef.html','WeekReviewRef','width=780,height=920,resizable=yes,scrollbars=yes')">☰ &nbsp; Open quick reference</button>
</div>

<script>
const STEPS = [
  {
    id: 's1',
    tag: 'Step 1 — Export',
    title: "Get the week's events from Monthplan",
    desc: 'Open <a href="https://yangwm2005.github.io/p/monthplan-v24.html" target="_blank">monthplan-v24.html</a>, review all events logged for the week, then export as Excel <code>.xlsx</code>.',
    subtasks: [
      'Open Monthplan in browser',
      'Review all events for the week',
      'Export as Excel (.xlsx)',
      'Save file with date in filename',
    ],
    notesPlaceholder: 'Any issues with the export? Missing events?',
  },
  {
    id: 's2',
    tag: 'Step 2 — Primary Analysis',
    title: 'Drop Excel + prompt into DeepSeek',
    desc: 'Upload <code>Weekly Event Analysis Deepseek v3.txt</code> first (or together) with the Excel file. Ask for personal progress, issues, and full weekly summary.',
    subtasks: [
      'Open DeepSeek',
      'Upload "Weekly Event Analysis Deepseek v3.txt" (prompt file)',
      'Upload Excel file (together or right after)',
      'Ask for weekly summary',
      'Ask for personal progress & issues',
      'Save / screenshot output for WIG meeting',
    ],
    notesPlaceholder: 'Key insights from DeepSeek this week...',
  },
  {
    id: 's3',
    tag: 'Step 3 — Secondary Analysis',
    title: 'Repeat in Gemini for a second perspective',
    desc: 'Upload the same Excel + prompt into Gemini. Output is less structured — treat as supplementary. Note any new angles DeepSeek missed.',
    subtasks: [
      'Open Gemini',
      'Upload same Excel file',
      'Upload prompt file',
      'Note any unique perspectives vs DeepSeek',
    ],
    notesPlaceholder: 'Anything Gemini surfaced that DeepSeek missed?',
  },
  {
    id: 's4',
    tag: 'Step 4 — Archive',
    title: 'Add analysis to NotebookLM monthly collection',
    desc: "Compile this week's AI analysis outputs into the month's NotebookLM PDF collection. Builds a searchable long-term record.",
    subtasks: [
      'Open NotebookLM monthly collection',
      'Add DeepSeek output (PDF or text)',
      'Add Gemini output (optional)',
      'Confirm month collection is up to date',
    ],
    notesPlaceholder: 'Any patterns to track across weeks?',
  },
];

const STORAGE_KEY = 'wig_weekly_review_v2';

function getWeekLabel() {
  const d = new Date();
  const yyyy = d.getFullYear();
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  return yyyy + '-' + mm + '-' + dd + ' · ' + days[d.getDay()];
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return {};
    return JSON.parse(raw);
  } catch(e) { return {}; }
}

function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}

let state = loadState();

function getStepState(sKey) {
  if (!state[sKey]) state[sKey] = { done: false, subtasks: {}, notes: '', open: false };
  if (typeof state[sKey].subtasks !== 'object' || Array.isArray(state[sKey].subtasks)) {
    state[sKey].subtasks = {};
  }
  return state[sKey];
}

function render() {
  document.getElementById('week-label').textContent = getWeekLabel();

  const container = document.getElementById('steps-container');
  container.innerHTML = '';

  let doneCount = 0;

  STEPS.forEach(function(step, idx) {
    const sKey = step.id;
    const sState = getStepState(sKey);
    if (sState.done) doneCount++;

    const card = document.createElement('div');
    card.className = 'step-card ' + step.id + (sState.done ? ' done' : '') + (sState.open ? ' open' : '');
    card.dataset.key = sKey;

    // Build subtask rows
    const subtaskRows = step.subtasks.map(function(st, si) {
      const checked = !!sState.subtasks[si];
      const div = document.createElement('div');
      div.className = 'subtask' + (checked ? ' checked' : '');
      div.dataset.si = si;
      div.innerHTML = '<div class="subtask-box"></div><div class="subtask-label">' + st + '</div>';
      return div.outerHTML;
    }).join('');

    // Build textarea separately to avoid innerHTML injection issues
    card.innerHTML =
      '<div class="step-header" data-action="toggle-open">' +
        '<div class="step-num-badge"><span class="step-num-inner">' + (idx+1) + '</span></div>' +
        '<div class="step-info">' +
          '<div class="step-tag-label">' + step.tag + '</div>' +
          '<div class="step-title-text">' + step.title + '</div>' +
        '</div>' +
        '<div class="chevron">▾</div>' +
      '</div>' +
      '<div class="step-body">' +
        '<div class="step-desc-text">' + step.desc + '</div>' +
        '<div class="subtasks">' + subtaskRows + '</div>' +
        '<div class="notes-label">Notes</div>' +
        '<textarea class="notes-area" data-action="notes" placeholder="' + step.notesPlaceholder + '"></textarea>' +
        '<button class="mark-done-btn" data-action="toggle-done">' +
          (sState.done ? '↩ Mark undone' : '✓ Mark step done') +
        '</button>' +
      '</div>';

    // Set textarea value directly (avoids HTML encoding issues)
    card.querySelector('textarea').value = sState.notes || '';

    container.appendChild(card);
  });

  updateProgress(doneCount);
}

function updateProgress(doneCount) {
  const pct = Math.round((doneCount / STEPS.length) * 100);
  document.getElementById('prog-count').textContent = doneCount + ' / ' + STEPS.length + ' steps';
  document.getElementById('prog-fill').style.width = pct + '%';
  const banner = document.getElementById('completion-banner');
  if (doneCount === STEPS.length) banner.classList.add('show');
  else banner.classList.remove('show');
}

// Single delegated listener on the container
document.getElementById('steps-container').addEventListener('click', function(e) {
  const card = e.target.closest('.step-card');
  if (!card) return;
  const sKey = card.dataset.key;

  // Header toggle
  if (e.target.closest('[data-action="toggle-open"]')) {
    const sState = getStepState(sKey);
    sState.open = !sState.open;
    saveState();
    render();
    return;
  }

  // Subtask toggle
  const subtaskEl = e.target.closest('.subtask');
  if (subtaskEl) {
    const si = subtaskEl.dataset.si;
    const sState = getStepState(sKey);
    sState.subtasks[si] = !sState.subtasks[si];
    saveState();
    render();
    return;
  }

  // Mark done button
  if (e.target.closest('[data-action="toggle-done"]')) {
    const sState = getStepState(sKey);
    sState.done = !sState.done;
    if (sState.done) sState.open = false;
    saveState();
    render();
    return;
  }
});

// Notes: use input event delegation (not click)
document.getElementById('steps-container').addEventListener('input', function(e) {
  if (e.target.dataset.action !== 'notes') return;
  const card = e.target.closest('.step-card');
  if (!card) return;
  const sState = getStepState(card.dataset.key);
  sState.notes = e.target.value;
  saveState();
});

function resetAll() {
  if (!confirm('Reset all steps for a new week? Notes will be cleared.')) return;
  state = {};
  saveState();
  render();
}

render();
</script>
</body>
</html>
