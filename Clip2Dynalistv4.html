<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clip to Dynalist</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        textarea {
            width: 100%; /* Full width */
            height: 100px; /* Fixed height */
            margin-top: 10px;
            padding: 10px;
            font-size: 14px;
            box-sizing: border-box; /* Ensure padding is included in width */
        }
        button {
            margin-top: 10px;
        }
        .iframe-container {
            width: 100%; /* Full width */
            max-width: 800px; /* Optional max-width */
            margin: 20px auto; /* Center the iframe */
        }
        iframe {
            width: 100%; /* Responsive width */
            height: 650px; /* Fixed height */
            border: 0; /* Remove border */
        }
    </style>
</head>
<body>

    <h2>Clip to Dynalist</h2>
    
    <!-- Button to add "Todo: and other button" -->
    <button id="selfButton" title="Self-awareness">Self</button>
    <button id="todoButton" title="Todo">Todo</button>
    <button id="ideaButton" title="Ideas">Idea</button>    
    <button id="socButton" title="Social works">Soc</button>
    <button id="clipButton" style="width:150px;font-size:18px;height:25;color:white;background-color:blue;">Clip to Dynalist</button>
    
    <!-- New Clear Button -->
    <button id="clearButton" title="Clean up the text" style="width:50px;font-size:14px;height:25;color:white;background-color:red;">Clear</button>
    
    <textarea id="editor" placeholder="Type or paste your content here..."></textarea>

    <script>
        // Functionality for adding "Self:"
        document.getElementById('selfButton').addEventListener('click', function() {
            const editor = document.getElementById('editor');
            editor.value = '**Selfaware:** ' + editor.value; // Prepend "Selfaware:" to existing content
            editor.focus(); // Set focus back to the textarea
        });

        // Functionality for adding "Todo:"
        document.getElementById('todoButton').addEventListener('click', function() {
            const editor = document.getElementById('editor');
            editor.value = '**Todo:** ' + editor.value; // Prepend "Todo:" to existing content
            editor.focus(); // Set focus back to the textarea
        });

        // Functionality for adding "Idea:"
        document.getElementById('ideaButton').addEventListener('click', function() {
            const editor = document.getElementById('editor');
            editor.value = '**Idea:** ' + editor.value; // Prepend "Idea:" to existing content
            editor.focus(); // Set focus back to the textarea
        });

        // Functionality for adding "Soc:"
        document.getElementById('socButton').addEventListener('click', function() {
            const editor = document.getElementById('editor');
            editor.value = '**Social:** ' + editor.value; // Prepend "Social:" to existing content
            editor.focus(); // Set focus back to the textarea
        });

        // Functionality for clipping to Dynalist
        document.getElementById('clipButton').addEventListener('click', function() {
            const userContent = document.getElementById('editor').value;
            const pageTitle = document.title;
            const pageURL = window.location.href;

            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const currentTime = `${hours}:${minutes} `;

            const content = `${currentTime}${userContent}`;

            const API_KEY = "AWwmrcTSqS-v1gvtyZWERosYxnLjDL32LMsk3cgEezbzqhIwht76yDGnSQTuASzQHEqpwO0p0mTk7vknzoKM_zKEW6_tBYCfkeXj4ZQ7k3o_FrEm5dgn6a2tVSo66J3X"; // Replace with your actual API key
            const API_URL = "https://dynalist.io/api/v1/inbox/add";

            const data = {
                token: API_KEY,
                content: content
            };

            fetch(API_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(data),
            })
            .then(response => response.json())
            .then(data => {
                if (data._code === 'Ok') {
                    alert('Clipped successfully to Dynalist Inbox!');
                    document.getElementById('editor').value = ''; // Clear the editor after success
                } else {
                    alert('Error clipping to Dynalist: ' + data._msg);
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('Failed to clip to Dynalist.');
            });
        });

        // Functionality for clearing the textarea
        document.getElementById('clearButton').addEventListener('click', function() {
            document.getElementById('editor').value = ''; // Clear the textarea
        });
    </script>

    <hr>
    <div class="iframe-container">
        <iframe name="inboxnow" 
                src="https://dynalist.io/d/QBPYSvxs9JO2gYfbf0sPhsoF" 
                frameborder="0" 
                scrolling="yes">
        </iframe>
    </div>

</body>
</html>
