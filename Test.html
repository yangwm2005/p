  // ── Dashboard ─────────────────────────────────────────────────────────────
  function sortProjects(projects, tasks) {
    const enriched = projects.map(p => {
      const pt   = tasks.filter(t => t.projectId === p.id);
      const done = pt.filter(t => t.status === 'done').length;
      const ppct = pt.length > 0 ? Math.round(done / pt.length * 100) : 0;
      const crit = pt.filter(t => t.priority === 'critical' && t.status !== 'done').length;
      const high = pt.filter(t => t.priority === 'high'     && t.status !== 'done').length;
      // "last updated" = latest createdAt or completedAt among its tasks, falling back to project createdAt
      const lastActivity = pt.reduce((mx, t) => Math.max(mx, t.createdAt||0, t.completedAt||0), p.createdAt||0);
      return { p, pt, done, ppct, crit, high, lastActivity };
    });

    const sorted = [...enriched];
    switch (projectSort) {
      case 'updated':
        sorted.sort((a, b) => b.lastActivity - a.lastActivity);
        break;
      case 'priority':
        sorted.sort((a, b) => {
          // critical first, then high, then by name
          if (b.crit !== a.crit) return b.crit - a.crit;
          if (b.high !== a.high) return b.high - a.high;
          return a.p.name.localeCompare(b.p.name);
        });
        break;
      case 'progress':
        // least complete first (most work remaining)
        sorted.sort((a, b) => a.ppct - b.ppct);
        break;
      case 'name':
        sorted.sort((a, b) => a.p.name.localeCompare(b.p.name));
        break;
      case 'newest':
        sorted.sort((a, b) => (b.p.createdAt||0) - (a.p.createdAt||0));
        break;
      case 'oldest':
        sorted.sort((a, b) => (a.p.createdAt||0) - (b.p.createdAt||0));
        break;
    }
    return sorted;
  }

  function buildDashboard() {
    const stats    = DB.getStats();
    const projects = DB.getProjects();
    const tasks    = DB.getTasks();
    const pct = stats.totalTasks > 0 ? Math.round(stats.doneTasks / stats.totalTasks * 100) : 0;

    const sortOptions = [
      { key: 'updated',  label: '🕐 Last Updated' },
      { key: 'priority', label: '🔴 Priority' },
      { key: 'progress', label: '📊 Progress' },
      { key: 'name',     label: '🔤 Name A–Z' },
      { key: 'newest',   label: '✨ Newest' },
      { key: 'oldest',   label: '📅 Oldest' },
    ];
    const sortBar = `
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap;">
        <span style="font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:var(--text-light);">Sort:</span>
        ${sortOptions.map(o => `
          <button class="filter-chip ${projectSort === o.key ? 'active' : ''}"
            onclick="APP.setProjectSort('${o.key}')">${o.label}</button>
        `).join('')}
      </div>`;

    const sorted = sortProjects(projects, tasks);
    const cards = sorted.map(({ p, pt, done, ppct, crit, high }) => {
      const col  = projColor(p.color);

      // Build open task list (in-progress first, then todo), up to 5 shown
      const inProgressTasks = pt.filter(t => t.status === 'progress');
      const todoTasks       = pt.filter(t => t.status === 'todo');
      const openTasks       = [...inProgressTasks, ...todoTasks];
      const MAX_SHOW        = 5;
      const shownTasks      = openTasks.slice(0, MAX_SHOW);
      const hiddenCount     = openTasks.length - shownTasks.length;

      const priStyle = (pri) => {
        if (pri === 'critical') return 'background:var(--p-critical-soft);color:var(--p-critical)';
        if (pri === 'high')     return 'background:var(--p-high-soft);color:var(--p-high)';
        if (pri === 'medium')   return 'background:var(--p-medium-soft);color:var(--p-medium)';
        return 'background:var(--p-low-soft);color:var(--p-low)';
      };
      const priIcon = (pri) => {
        if (pri === 'critical') return '🔴';
        if (pri === 'high')     return '🟠';
        if (pri === 'medium')   return '🔵';
        return '⚪';
      };
      const dotColor = (status) => status === 'progress' ? 'var(--warn)' : 'var(--text-light)';

      const taskRowsHtml = shownTasks.length === 0
        ? `<div style="font-size:0.75rem;color:var(--text-light);padding:3px 2px;font-style:italic;">No open tasks</div>`
        : shownTasks.map(t => {
            const dueHtml = t.dueDate ? (() => {
              const d = new Date(t.dueDate + 'T00:00:00');
              const now = new Date(); now.setHours(0,0,0,0);
              const diff = Math.round((d - now) / 86400000);
              const str = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
              const col = diff < 0 ? 'var(--danger)' : diff === 0 ? 'var(--success)' : diff <= 2 ? 'var(--warn)' : 'var(--text-light)';
              return `<span class="proj-task-due-sm" style="color:${col}">${diff < 0 ? '⚠ ' : ''}${str}</span>`;
            })() : '';
            return `<div class="proj-task-row" onclick="event.stopPropagation();APP.navigate('project','${p.id}')" title="${escHtml(t.title)}">
              <span class="proj-task-dot-sm" style="background:${dotColor(t.status)}"></span>
              <span class="proj-task-name-sm">${escHtml(t.title)}</span>
              <span class="proj-task-pri-sm" style="${priStyle(t.priority)}">${priIcon(t.priority)}</span>
              ${dueHtml}
            </div>`;
          }).join('');

      const chipsHtml = (inProgressTasks.length > 0 || todoTasks.length > 0)
        ? `<div class="proj-open-tasks-chips">
            ${inProgressTasks.length > 0 ? `<span class="pot-chip pot-chip-progress">🔄 ${inProgressTasks.length}</span>` : ''}
            ${todoTasks.length > 0       ? `<span class="pot-chip pot-chip-todo">📋 ${todoTasks.length}</span>`           : ''}
          </div>` : '';

      const openTasksSection = `
        <div class="proj-open-tasks">
          <div class="proj-open-tasks-head">
            <span class="proj-open-tasks-label">Open Tasks</span>
            ${chipsHtml}
          </div>
          ${taskRowsHtml}
          ${hiddenCount > 0 ? `<div class="proj-more-link" onclick="event.stopPropagation();APP.navigate('project','${p.id}')">+${hiddenCount} more task${hiddenCount > 1 ? 's' : ''}…</div>` : ''}
        </div>`;

      return `<div class="project-card" onclick="APP.navigate('project','${p.id}')">
        <div style="position:absolute;top:0;left:0;right:0;height:3px;background:${col};border-radius:var(--radius-lg) var(--radius-lg) 0 0"></div>
        <div class="project-card-header">
          <div class="project-icon" style="background:${col}22;color:${col}">${escHtml(p.icon)}</div>
          <div><div class="project-name">${escHtml(p.name)}</div><div class="project-desc">${escHtml(p.description)}</div></div>
        </div>
        <div class="project-progress">
          <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${ppct}%;background:${col}"></div></div>
          <div class="progress-label"><span>${done}/${pt.length} tasks</span><span>${ppct}%</span></div>
        </div>
        <div class="project-stats">
          ${inProgressTasks.length > 0 ? `<div class="project-stat" style="color:var(--warn)">● ${inProgressTasks.length} in progress</div>` : ''}
          ${crit > 0 ? `<div class="project-stat" style="color:var(--danger)">🔴 ${crit} critical</div>` : ''}
          ${crit === 0 && inProgressTasks.length === 0 && done === pt.length && pt.length > 0 ? `<div class="project-stat" style="color:var(--success)">✓ All done</div>` : ''}
        </div>
        ${openTasksSection}
      </div>`;
    }).join('');
    return `
      <div class="stats-row">
        <div class="stat-card"><div class="stat-value">${stats.totalProjects}</div><div class="stat-label">Projects</div></div>
        <div class="stat-card"><div class="stat-value">${stats.totalTasks - stats.doneTasks}</div><div class="stat-label">Open Tasks</div></div>
        <div class="stat-card"><div class="stat-value" style="color:var(--success)">${pct}%</div><div class="stat-label">Overall Done</div></div>
        <div class="stat-card"><div class="stat-value" style="color:${stats.critical>0?'var(--danger)':'var(--text)'}">${stats.critical}</div><div class="stat-label">Critical Open</div></div>
        <div class="stat-card"><div class="stat-value" style="color:${stats.overdue>0?'var(--warn)':'var(--text)'}">${stats.overdue}</div><div class="stat-label">Overdue</div></div>
      </div>
      ${sortBar}
      <div class="projects-grid">${cards}
        <div class="project-card" onclick="APP.showNewProjectDialog()"
          style="border:2px dashed var(--border);background:transparent;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;min-height:160px;cursor:pointer"
          onmouseover="this.style.borderColor='var(--accent)';this.style.background='var(--accent-soft)'"
          onmouseout="this.style.borderColor='var(--border)';this.style.background='transparent'">
          <div style="font-size:1.8rem;color:var(--text-light)">＋</div>
          <div style="font-size:0.85rem;color:var(--text-muted);font-weight:500">New Project</div>
        </div>
      </div>`;
  }

  // ── Filters ───────────────────────────────────────────────────────────────
  function filterTasks(tasks) {
    let t = [...tasks];
    if (filterPriority !== 'all') t = t.filter(x => x.priority === filterPriority);
    if (filterStatus   !== 'all') t = t.filter(x => x.status   === filterStatus);
    if (searchQuery.trim()) {
      const q = searchQuery.toLowerCase();
      t = t.filter(x => x.title.toLowerCase().includes(q) || (x.note||'').toLowerCase().includes(q));
    }
    const po = { critical:0, high:1, medium:2, low:3 };
    t.sort((a, b) => {
      if (a.status==='done' && b.status!=='done') return 1;
      if (b.status==='done' && a.status!=='done') return -1;
      const pd = (po[a.priority]||2) - (po[b.priority]||2);
      if (pd !== 0) return pd;
      if (a.dueDate && b.dueDate) return a.dueDate.localeCompare(b.dueDate);
      if (a.dueDate) return -1; if (b.dueDate) return 1;
      return (a.order||0) - (b.order||0);
    });
    return t;
  }

  function buildFilterBar() {
    const prios    = ['all','critical','high','medium','low'];
    const statuses = ['all','todo','progress','review','done'];
    const pc = prios.map(p => `<button class="filter-chip ${filterPriority===p?'active':''}" onclick="APP.setFilter('priority','${p}')">${p==='all'?'All':PRIORITY_META[p]?.label||p}</button>`).join('');
    const sc = statuses.map(s => `<button class="filter-chip ${filterStatus===s?'active':''}" onclick="APP.setFilter('status','${s}')">${s==='all'?'All':STATUS_META[s]?.label||s}</button>`).join('');
    return `<div class="filter-bar" style="margin-bottom:12px;border-radius:var(--radius);border:1px solid var(--border)">
      <span class="filter-label">Priority:</span>${pc}
      <span class="filter-label" style="margin-left:6px">Status:</span>${sc}
    </div>`;
  }

  function buildQuickAddRow() {
    const projects = DB.getProjects();
    const projOpts = projects.map(p =>
      `<option value="${p.id}" ${p.id===currentProjectId?'selected':''}>${escHtml(p.icon)} ${escHtml(p.name)}</option>`
    ).join('');
    return `<div class="card" style="margin-bottom:12px"><div class="quick-add-row">
      <input class="quick-input" id="quickTaskInput" type="text" placeholder="Quick-add a task… (Enter)">
      ${projects.length > 1
        ? `<select class="form-select" id="quickProject" style="min-width:130px">${projOpts}</select>`
        : `<input type="hidden" id="quickProject" value="${projects[0]?.id||''}">`}
      <select class="form-select" id="quickPriority" style="min-width:118px">
        <option value="medium">Medium</option><option value="critical">Critical</option>
        <option value="high">High</option><option value="low">Low</option>
      </select>
      <input type="date" class="form-input" id="quickDueDate" style="min-width:136px">
      <button class="btn btn-primary btn-sm" onclick="APP.quickAddTask()">+ Add</button>
    </div></div>`;
  }

  // ── Settings helpers ──────────────────────────────────────────────────────
  function saveSettings() {
    localStorage.setItem('qpm_settings', JSON.stringify({ defaultDetailOpen, projectSort }));
  }

  // Unified per-task detail toggle (subtasks + notes + think log)
  function toggleDetail(taskId) {
    const cur = detailOpenState.has(taskId) ? detailOpenState.get(taskId) : defaultDetailOpen;
    const next = !cur;
    detailOpenState.set(taskId, next);
    // DOM-only update to avoid full re-render
    const li = document.querySelector(`.task-item[data-id="${taskId}"]`);
    if (!li) return;
    const panel = li.querySelector('.task-detail-panel');
    const btn   = li.querySelector('.detail-toggle-btn');
    if (panel) panel.style.display = next ? 'block' : 'none';
    if (btn)   { btn.classList.toggle('is-open', next); btn.textContent = next ? 'Details ▲' : 'Details ▶'; }
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // ── Q·Todo-style task row ─────────────────────────────────────────────────
  // ═══════════════════════════════════════════════════════════════════════════
  function createTaskElement(task) {
    if (task.subtasksVisible === undefined) task.subtasksVisible = true;

    const li = document.createElement('li');
    li.className = 'task-item';
    li.dataset.id = task.id;

    const row = document.createElement('div');
    row.className = 'task-row';

    // ── Drag handle ────────────────────────────────────────────────────────
    const dh = document.createElement('span');
    dh.className = 'drag-handle'; dh.innerHTML = '⠿';
    dh.addEventListener('mousedown', () => li.setAttribute('draggable','true'));
    dh.addEventListener('mouseup',   () => li.setAttribute('draggable','false'));
    li.addEventListener('dragstart', e => {
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', task.id);
      setTimeout(() => li.classList.add('dragging'), 0);
    });
    li.addEventListener('dragend', () => {
      li.classList.remove('dragging'); li.setAttribute('draggable','false');
      document.querySelectorAll('.task-item.drag-over').forEach(el => el.classList.remove('drag-over'));
    });
    li.addEventListener('dragover', e => {
      if (e.dataTransfer.types.includes('Files')) return;
      e.preventDefault(); e.stopPropagation();
      document.querySelectorAll('.task-item.drag-over').forEach(el => el.classList.remove('drag-over'));
      const dragging = document.querySelector('.task-item.dragging');
      if (dragging && dragging.dataset.id !== task.id) li.classList.add('drag-over');
    });
    li.addEventListener('dragleave', () => li.classList.remove('drag-over'));
    li.addEventListener('drop', e => {
      if (e.dataTransfer.types.includes('Files')) return;
      e.preventDefault(); e.stopPropagation();
      li.classList.remove('drag-over');
      const fromId = e.dataTransfer.getData('text/plain');
      if (!fromId || fromId === task.id) return;
      let arr = DB.getTasks(task.projectId);
      const fromIdx = arr.findIndex(t => t.id === fromId);
      const toIdx   = arr.findIndex(t => t.id === task.id);
      if (fromIdx === -1 || toIdx === -1) return;
      const [moved] = arr.splice(fromIdx, 1);
      arr.splice(toIdx, 0, moved);
      arr.forEach((t, i) => DB.updateTask(t.id, { order: i }));
      renderContent();
    });
    row.appendChild(dh);

    // ── Checkbox ───────────────────────────────────────────────────────────
    const cb = document.createElement('input');
    cb.type = 'checkbox'; cb.className = 'task-check'; cb.checked = task.status === 'done';
    cb.addEventListener('change', () => { DB.moveTask(task.id, cb.checked ? 'done' : 'todo'); render(); });
    row.appendChild(cb);

    // ── Title label (double-click to edit inline) ──────────────────────────
    const lbl = document.createElement('span');
    lbl.className = `task-label ${task.status === 'done' ? 'done' : ''}`;
    lbl.textContent = task.title;
    lbl.title = 'Double-click to edit';
    lbl.addEventListener('dblclick', function () {
      const inp = document.createElement('input');
      inp.type = 'text'; inp.value = task.title;
      inp.className = 'task-label editing';
      row.replaceChild(inp, lbl);
      inp.focus();
      let saved = false;
      const save = () => {
        if (saved) return; saved = true;
        const v = inp.value.trim();
        if (v && v !== task.title) DB.updateTask(task.id, { title: v });
        if (inp.parentNode) row.replaceChild(lbl, inp);
        lbl.textContent = v || task.title;
      };
      inp.addEventListener('blur', save);
      inp.addEventListener('keydown', e => {
        if (e.key === 'Enter') {
          e.preventDefault();
          const taskList = li.parentNode; const nextLi = li.nextElementSibling;
          save();
          if (!taskList) return;
          const phLi = document.createElement('li');
          phLi.className = 'task-item'; phLi.style.cssText = 'border-bottom:1px solid var(--border)';
          const phInp = document.createElement('input');
          phInp.type = 'text'; phInp.placeholder = 'New task… (Esc to cancel)';
          phInp.className = 'task-input';
          phInp.style.cssText = 'width:100%;padding:9px 14px;border:none;border-radius:0;background:var(--accent-soft);font-size:0.9rem;outline:none;';
          let done = false;
          const finish = () => { if (done) return; done = true; if (phLi.parentNode) phLi.remove(); };
          phInp.addEventListener('keydown', pe => {
            if (pe.key === 'Enter') {
              pe.preventDefault(); const pv = phInp.value.trim(); finish();
              if (pv) { const nt = DB.createTask({ projectId: task.projectId, title: pv, priority: task.priority, status: 'todo' }); pendingEditId = nt.id; renderContent(); }
            } else if (pe.key === 'Escape') { finish(); }
          });
          phInp.addEventListener('blur', () => setTimeout(finish, 150));
          phLi.appendChild(phInp);
          if (nextLi && nextLi.parentNode === taskList) taskList.insertBefore(phLi, nextLi);
          else taskList.appendChild(phLi);
          phInp.focus();
        }
        if (e.key === 'Escape') { if (inp.parentNode) row.replaceChild(lbl, inp); }
      });
    });
    row.appendChild(lbl);

    // ── Project tag (shown when not inside a project page) ─────────────────
    const proj = DB.getProjects().find(p => p.id === task.projectId);
    if (proj && currentPage !== 'project') {
      const pt = document.createElement('span');
      pt.className = 'task-project-tag'; pt.style.background = projColor(proj.color);
      pt.textContent = proj.name;
      row.appendChild(pt);
    }

    // ── Priority dropdown ──────────────────────────────────────────────────
    const pm = PRIORITY_META[task.priority] || PRIORITY_META.medium;
    const pbWrap = document.createElement('span');
    pbWrap.className = `priority-badge ${pm.cls}`;
    pbWrap.style.cssText = 'display:inline-flex;align-items:center;gap:3px;padding:2px 4px 2px 7px;';
    pbWrap.setAttribute('data-prio-wrap', task.id);

    const pbIcon = document.createElement('span');
    pbIcon.textContent = pm.icon;
    pbIcon.style.cssText = 'pointer-events:none;line-height:1;font-size:0.75rem;';

    const pb = document.createElement('select');
    pb.style.cssText = 'border:none;cursor:pointer;font-family:inherit;font-size:0.7rem;font-weight:600;padding:0;outline:none;appearance:none;-webkit-appearance:none;background:transparent;color:inherit;max-width:60px;';
    pb.title = 'Change priority';
    Object.entries(PRIORITY_META).forEach(([k, v]) => {
      const opt = document.createElement('option');
      opt.value = k; opt.textContent = v.label; opt.selected = k === task.priority;
      pb.appendChild(opt);
    });
    pb.addEventListener('change', e => {
      DB.updateTask(task.id, { priority: e.target.value }); render();
    });
    pb.addEventListener('click', e => e.stopPropagation());
    pbWrap.appendChild(pbIcon);
    pbWrap.appendChild(pb);
    row.appendChild(pbWrap);

    // ── Status dropdown ────────────────────────────────────────────────────
    const sm = STATUS_META[task.status] || STATUS_META.todo;
    const sb = document.createElement('select');
    sb.className = `status-badge ${sm.cls}`;
    sb.style.cssText = 'border:none;cursor:pointer;font-family:inherit;font-size:0.7rem;font-weight:600;padding:2px 8px;border-radius:20px;outline:none;appearance:none;-webkit-appearance:none;background:inherit;color:inherit;';
    sb.title = 'Change status';
    Object.entries(STATUS_META).forEach(([k, v]) => {
      const opt = document.createElement('option');
      opt.value = k; opt.textContent = v.label; opt.selected = k === task.status;
      sb.appendChild(opt);
    });
    sb.addEventListener('change', e => {
      DB.updateTask(task.id, { status: e.target.value }); render();
    });
    sb.addEventListener('click', e => e.stopPropagation());
    row.appendChild(sb);

    // ── Due date ───────────────────────────────────────────────────────────
    if (task.dueDate) {
      const dd = document.createElement('span');
      dd.innerHTML = formatDate(task.dueDate);
      row.appendChild(dd);
    }

    // ── Action buttons ─────────────────────────────────────────────────────
    const actions = document.createElement('div');
    actions.className = 'task-actions';

    // Timer
    const tw  = document.createElement('div'); tw.className = 'timer-wrap';
    const tdisp = document.createElement('span');
    tdisp.className = `timer-display ${activeTimers.has(task.id) ? 'running' : ''}`;
    tdisp.setAttribute('data-timer-id', task.id);
    tdisp.textContent = fmtTime(task.timeSpentSeconds || 0);
    const tbtn = document.createElement('button');
    tbtn.className = 'act-btn'; tbtn.innerHTML = activeTimers.has(task.id) ? '⏸' : '▶'; tbtn.title = 'Timer';
    tbtn.setAttribute('data-timer-btn', task.id);
    tbtn.addEventListener('click', () => toggleTimer(task.id));
    const tpre = document.createElement('select'); tpre.className = 'timer-preset';
    tpre.innerHTML = '<option value="">+min</option><option value="15">+15</option><option value="30">+30</option><option value="45">+45</option><option value="60">+60</option>';
    tpre.addEventListener('change', e => {
      const m = parseInt(e.target.value);
      if (m) { const cur = DB.getTask(task.id); DB.updateTask(task.id, { timeSpentSeconds: (cur?.timeSpentSeconds||0) + m*60 }); tpre.value = ''; tdisp.textContent = fmtTime(DB.getTask(task.id).timeSpentSeconds||0); }
    });
    tw.appendChild(tdisp); tw.appendChild(tbtn); tw.appendChild(tpre);
    actions.appendChild(tw);

    // 📝 Note — quick-add/edit (keep as action button for adding notes when none exist)
    const noteBtn = document.createElement('button');
    noteBtn.className = `act-btn ${task.note ? 'note-active' : ''}`;
    noteBtn.innerHTML = '📝'; noteBtn.title = task.note ? 'Edit note' : 'Add note';
    noteBtn.addEventListener('click', () => openNoteEditor(task, li));
    actions.appendChild(noteBtn);

    // 💬 Think Log — opens overlay
    const thinkBtn = document.createElement('button');
    thinkBtn.className = `act-btn think-btn ${(task.thinkLog && task.thinkLog.length) ? 'has-log' : ''}`;
    thinkBtn.title = 'Think Log';
    thinkBtn.innerHTML = '💬';
    if (task.thinkLog && task.thinkLog.length) {
      const badge = document.createElement('span'); badge.className = 'think-badge';
      thinkBtn.appendChild(badge);
    }
    thinkBtn.addEventListener('click', () => openThinkLog(task));
    actions.appendChild(thinkBtn);

    // ⊕ Add subtask
    const addStBtn = document.createElement('button');
    addStBtn.className = 'act-btn'; addStBtn.innerHTML = '⊕'; addStBtn.title = 'Add subtask';
    addStBtn.addEventListener('click', () => openSubtaskAddRow(task, li));
    actions.appendChild(addStBtn);

    // 📅 Inline date picker
    const dateBtn = document.createElement('button');
    dateBtn.className = 'act-btn'; dateBtn.innerHTML = '📅'; dateBtn.title = 'Set due date';
    dateBtn.addEventListener('click', () => {
      let di = li.querySelector('.inline-date-input');
      if (di) return;
      di = document.createElement('input'); di.type = 'date'; di.className = 'inline-date-input';
      di.value = task.dueDate || '';
      di.addEventListener('change', () => { DB.updateTask(task.id, { dueDate: di.value }); di.remove(); render(); });
      di.addEventListener('blur', () => setTimeout(() => di.remove(), 200));
      actions.appendChild(di); di.focus(); di.click();
    });
    actions.appendChild(dateBtn);

    // ✏ Full edit dialog
    const editBtn = document.createElement('button');
    editBtn.className = 'act-btn'; editBtn.innerHTML = '✏'; editBtn.title = 'Edit task';
    editBtn.addEventListener('click', () => showEditTaskDialog(task.id));
    actions.appendChild(editBtn);

    // 🗑 Delete
    const delBtn = document.createElement('button');
    delBtn.className = 'act-btn danger'; delBtn.innerHTML = '🗑'; delBtn.title = 'Delete task';
    delBtn.addEventListener('click', () => confirmDialog('Delete this task?', () => { DB.deleteTask(task.id); render(); }));
    actions.appendChild(delBtn);

    // ▶ Details — unified toggle for subtasks + notes + think log
    const hasDetails = (task.subtasks && task.subtasks.length > 0) || task.note || (task.thinkLog && task.thinkLog.length > 0);
    const isOpen = detailOpenState.has(task.id) ? detailOpenState.get(task.id) : defaultDetailOpen;
    const detailToggle = document.createElement('button');
    detailToggle.className = `detail-toggle-btn${isOpen ? ' is-open' : ''}`;
    detailToggle.textContent = isOpen ? 'Details ▲' : 'Details ▶';
    detailToggle.title = 'Toggle subtasks, notes & think log';
    detailToggle.addEventListener('click', e => { e.stopPropagation(); toggleDetail(task.id); });
    actions.appendChild(detailToggle);

    row.appendChild(actions);
    li.appendChild(row);

    // ── Unified detail panel (subtasks + notes + think log) ────────────────
    const detailPanel = document.createElement('div');
    detailPanel.className = 'task-detail-panel';
    detailPanel.style.display = isOpen ? 'block' : 'none';
    detailPanel.style.cssText += '; padding: 0 14px 10px 14px;';

    // — Subtasks section —
    if (task.subtasks && task.subtasks.length > 0) {
      const secLbl = document.createElement('div');
      secLbl.style.cssText = 'font-size:0.7rem;font-weight:700;text-transform:uppercase;color:var(--text-muted);letter-spacing:0.05em;padding:8px 0 4px;';
      secLbl.textContent = '📋 Subtasks';
      detailPanel.appendChild(secLbl);

      const stList = document.createElement('ul');
      stList.className = 'subtask-list';
      task.subtasks.forEach(st => {
        const stLi = document.createElement('li'); stLi.className = 'subtask-item';
        const dh2  = document.createElement('span'); dh2.className = 'drag-handle'; dh2.innerHTML = '⠿';
        const cb2  = document.createElement('input');
        cb2.type = 'checkbox'; cb2.className = 'subtask-check'; cb2.checked = st.completed;
        cb2.addEventListener('change', () => { DB.toggleSubtask(task.id, st.id); render(); });
        const lbl2 = document.createElement('span');
        lbl2.className = `subtask-label ${st.completed ? 'done' : ''}`;
        lbl2.textContent = st.text; lbl2.setAttribute('data-subtask-id', st.id);
        lbl2.title = 'Double-click to edit';
        lbl2.addEventListener('dblclick', () => {
          lbl2.contentEditable = 'true'; lbl2.focus();
          const sel = window.getSelection(); const range = document.createRange();
          range.selectNodeContents(lbl2); sel.removeAllRanges(); sel.addRange(range);
          lbl2.addEventListener('blur', () => {
            lbl2.contentEditable = 'false';
            const v = lbl2.textContent.trim();
            if (v && v !== st.text) DB.editSubtask(task.id, st.id, v);
            else lbl2.textContent = st.text;
            render();
          }, { once: true });
          lbl2.addEventListener('keydown', e => {
            if (e.key === 'Enter') {
              e.preventDefault(); lbl2.blur();
              setTimeout(() => {
                const liveLi = document.querySelector(`.task-item[data-id="${task.id}"]`);
                if (!liveLi) return;
                let stl = liveLi.querySelector('.subtask-list');
                if (!stl) { stl = document.createElement('ul'); stl.className = 'subtask-list'; liveLi.querySelector('.task-detail-panel').appendChild(stl); }
                const phLi = document.createElement('li'); phLi.className = 'subtask-item';
                const phInp = document.createElement('input');
                phInp.type = 'text'; phInp.placeholder = 'New subtask… (Esc to cancel)';
                phInp.className = 'subtask-label'; phInp.style.flex = '1';
                let done2 = false;
                const fin = () => { if (done2) return; done2 = true; if (phLi.parentNode) phLi.remove(); };
                phInp.addEventListener('keydown', pe => {
                  if (pe.key === 'Enter') { pe.preventDefault(); const pv = phInp.value.trim(); fin(); if (pv) { DB.addSubtask(task.id, pv); render(); } }
                  else if (pe.key === 'Escape') { fin(); }
                });
                phInp.addEventListener('blur', () => setTimeout(fin, 150));
                phLi.appendChild(phInp); stl.appendChild(phLi); phInp.focus();
              }, 0);
            }
            if (e.key === 'Escape') { lbl2.contentEditable = 'false'; lbl2.textContent = st.text; }
          });
        });
        const del2 = document.createElement('button');
        del2.className = 'act-btn danger'; del2.style.cssText = 'width:22px;height:22px;font-size:0.75rem';
        del2.innerHTML = '✕'; del2.title = 'Delete subtask';
        del2.addEventListener('click', () => { DB.deleteSubtask(task.id, st.id); render(); });
        stLi.appendChild(dh2); stLi.appendChild(cb2); stLi.appendChild(lbl2); stLi.appendChild(del2);
        stList.appendChild(stLi);
      });
      detailPanel.appendChild(stList);
    }

    // — Notes section —
    if (task.note) {
      const secLbl2 = document.createElement('div');
      secLbl2.style.cssText = 'font-size:0.7rem;font-weight:700;text-transform:uppercase;color:var(--text-muted);letter-spacing:0.05em;padding:8px 0 4px;';
      secLbl2.textContent = '📝 Notes';
      detailPanel.appendChild(secLbl2);

      const noteDiv = document.createElement('div');
      noteDiv.className = 'task-note';
      noteDiv.style.display = 'block'; // always visible within the panel
      noteDiv.innerHTML = `<div class="task-note-text">📌 ${formatNoteAsHtml(task.note)}</div>
        <div class="note-actions">
          <button class="btn btn-ghost btn-xs">Edit</button>
          <button class="btn btn-ghost btn-xs" style="color:var(--danger)">✕</button>
        </div>`;
      noteDiv.querySelector('.note-actions button:first-child').addEventListener('click', () => openNoteEditor(task, li));
      noteDiv.querySelector('.note-actions button:last-child').addEventListener('click', () =>
        confirmDialog('Delete this note?', () => { DB.updateTask(task.id, { note: '' }); render(); }));
      detailPanel.appendChild(noteDiv);
    }

    // — Think Log section —
    if (task.thinkLog && task.thinkLog.length > 0) {
      const secLbl3 = document.createElement('div');
      secLbl3.style.cssText = 'font-size:0.7rem;font-weight:700;text-transform:uppercase;color:var(--text-muted);letter-spacing:0.05em;padding:8px 0 4px;';
      secLbl3.textContent = '💬 Think Log';
      detailPanel.appendChild(secLbl3);

      const tlPanel = document.createElement('div');
      tlPanel.className = 'think-log-panel';
      tlPanel.style.display = 'block'; // always visible within the detail panel
      task.thinkLog.forEach(entry => {
        const eRow = document.createElement('div');
        eRow.className = `think-log-entry${entry.isSubchat ? ' is-subchat' : ''}${entry.isYellow ? ' is-yellow' : ''}${entry.isOrange ? ' is-orange' : ''}`;
        eRow.innerHTML = `<span class="think-log-ts">${entry.timestamp || ''}</span><span class="think-log-text">${escHtml(entry.text || '')}</span>`;
        tlPanel.appendChild(eRow);
      });
      const tlActions = document.createElement('div');
      tlActions.className = 'think-log-actions';
      const openAgainBtn = document.createElement('button');
      openAgainBtn.className = 'btn btn-ghost btn-xs';
      openAgainBtn.innerHTML = '💬 Open Think Log';
      openAgainBtn.addEventListener('click', () => openThinkLog(task));
      const clearLogBtn = document.createElement('button');
      clearLogBtn.className = 'btn btn-ghost btn-xs';
      clearLogBtn.style.color = 'var(--danger)';
      clearLogBtn.innerHTML = '✕ Clear';
      clearLogBtn.addEventListener('click', () =>
        confirmDialog('Clear the Think Log for this task?', () => { DB.updateTask(task.id, { thinkLog: [] }); render(); })
      );
      tlActions.appendChild(openAgainBtn);
      tlActions.appendChild(clearLogBtn);
      tlPanel.appendChild(tlActions);
      detailPanel.appendChild(tlPanel);
    }

    li.appendChild(detailPanel);

    return li;
  }

  // ── Note helpers ──────────────────────────────────────────────────────────
  function formatNoteAsHtml(text) {
    if (!text) return '';
    const lines = text.split(/\r?\n/).filter(l => l.trim());
    if (!lines.length) return escHtml(text);
    return '<ul style="margin:4px 0 0 16px;padding:0">' +
      lines.map(l => `<li style="margin-bottom:2px">${escHtml(l.trim())}</li>`).join('') + '</ul>';
  }
  function noteToEditor(text) {
    return (text || '').split(/\r?\n/).filter(l => l.trim()).map(l => `• ${l.trim()}`).join('\n');
  }
  function noteFromEditor(raw) {
    return raw.split(/\r?\n/).map(l => l.replace(/^[•]\s*/, '').trim()).filter(l => l).join('\n');
  }

  function openNoteEditor(task, li) {
    li.querySelector('.task-note-wrapper')?.remove();
    li.querySelector('.note-input-wrap')?.remove();
    // Ensure detail panel is open
    if (!detailOpenState.get(task.id) && !defaultDetailOpen) {
      detailOpenState.set(task.id, true);
      const panel = li.querySelector('.task-detail-panel');
      const btn   = li.querySelector('.detail-toggle-btn');
      if (panel) panel.style.display = 'block';
      if (btn)   { btn.classList.add('is-open'); btn.textContent = 'Details ▲'; }
    }
    const wrap = document.createElement('div'); wrap.className = 'note-input-wrap';
    const ta   = document.createElement('textarea'); ta.className = 'note-textarea'; ta.rows = 4;
    ta.placeholder = 'Each line becomes a bullet •\nType your notes here…\nDrag bottom-right corner to resize';
    if (task.note) ta.value = noteToEditor(task.note);
    const btnGroup = document.createElement('div');
    btnGroup.style.cssText = 'display:flex;gap:6px;justify-content:flex-end;margin-top:6px';
    const saveB = document.createElement('button'); saveB.className = 'btn btn-primary btn-sm'; saveB.textContent = 'Save Note';
    const canB  = document.createElement('button'); canB.className  = 'btn btn-ghost btn-sm';   canB.textContent  = 'Cancel';
    saveB.addEventListener('click', () => {
      const cleaned = noteFromEditor(ta.value);
      DB.updateTask(task.id, { note: cleaned }); wrap.remove(); render();
    });
    canB.addEventListener('click', () => { wrap.remove(); render(); });
    btnGroup.appendChild(saveB); btnGroup.appendChild(canB);
    wrap.appendChild(ta); wrap.appendChild(btnGroup);
    // Place inside the detail panel if it exists, otherwise at end of li
    const detailPanel = li.querySelector('.task-detail-panel');
    if (detailPanel) detailPanel.appendChild(wrap);
    else li.appendChild(wrap);
    ta.focus();
  }

  // ── Think Log — in-page overlay ─────────────────────────────────────────
  let _tlTask = null, _tlMsgs = [], _tlSel = new Set(), _tlDirty = false;

  function _tlTs() {
    var d=new Date(),h=d.getHours(),m=d.getMinutes(),ap=h>=12?'PM':'AM';
    return (h%12||12)+':'+(('0'+m).slice(-2))+' '+ap;
  }
  function _tlExpand(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,120)+'px'; }
  function _tlStat(msg, ok) {
    var b=document.getElementById('tlStatusBar'); if(!b) return;
    b.textContent=msg; b.className=ok?'tl-ok':'';
    if(ok) setTimeout(function(){ b.textContent='Ready'; b.className=''; }, 3000);
  }
  function _tlDirtyMark() {
    _tlDirty=true;
    var b=document.getElementById('tlSaveBtn');
    if(b){ b.textContent='\u{1F4BE} Save to Task \u2605'; b.className='tl-savebtn dirty'; }
  }

  function _tlRender() {
    var box=document.getElementById('tlChatBox'); if(!box) return;
    box.innerHTML='';
    if(!_tlMsgs.length) {
      box.innerHTML='<div class="tl-empty"><span class="tl-ei">\u{1F4AD}</span>Start jotting your thoughts\u2026<br><small style="color:#c4b5fd">Enter to send \u00B7 Shift+Enter for new line \u00B7 Ctrl-click to select</small></div>';
      return;
    }
    _tlMsgs.forEach(function(m,i){ box.appendChild(_tlMsgEl(m,i)); });
    box.scrollTop=box.scrollHeight;
    var si=document.getElementById('tlSearchInput');
    if(si && si.value) _tlFilter(si.value);
  }

  var _tlDragIdx = null;

  function _tlClearDropStyles() {
    document.querySelectorAll('.tl-drop-before,.tl-drop-after').forEach(function(el){
      el.classList.remove('tl-drop-before','tl-drop-after');
    });
  }

  function _tlAddDragEvents(el, idx) {
    el.draggable = true;

    el.addEventListener('dragstart', function(e) {
      _tlDragIdx = idx;
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', idx); // required for Firefox
      setTimeout(function(){ el.classList.add('tl-dragging'); }, 0);
    });

    el.addEventListener('dragend', function() {
      el.classList.remove('tl-dragging');
      _tlClearDropStyles();
      // Note: do NOT reset _tlDragIdx here — drop fires before dragend in Chrome
      // but we still need _tlDragIdx valid at drop time. Reset happens in drop handler.
    });

    el.addEventListener('dragover', function(e) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      if(_tlDragIdx === null || _tlDragIdx === idx) return;
      _tlClearDropStyles();
      var rect = el.getBoundingClientRect();
      var midY = rect.top + rect.height / 2;
      if(e.clientY < midY) { el.classList.add('tl-drop-before'); }
      else                  { el.classList.add('tl-drop-after');  }
    });

    el.addEventListener('dragleave', function(e) {
      // Only clear if leaving to outside this element
      if(!el.contains(e.relatedTarget)) {
        el.classList.remove('tl-drop-before','tl-drop-after');
      }
    });

    el.addEventListener('drop', function(e) {
      e.preventDefault();
      _tlClearDropStyles();
      var fromIdx = _tlDragIdx;
      _tlDragIdx = null;
      if(fromIdx === null || fromIdx === idx) return;
      var rect = el.getBoundingClientRect();
      var midY = rect.top + rect.height / 2;
      var insertBefore = (e.clientY < midY);
      var toIdx = insertBefore ? idx : idx + 1;
      // Adjust for the removal of the dragged item shifting indices
      if(fromIdx < toIdx) toIdx--;
      if(fromIdx === toIdx) return;
      var item = _tlMsgs.splice(fromIdx, 1)[0];
      _tlMsgs.splice(toIdx, 0, item);
      _tlDirtyMark();
      _tlRender();
    });
  }

  function _tlMsgEl(m, idx) {
    var d=document.createElement('div');

    var handle = document.createElement('span');
    handle.className = 'tl-drag-handle';
    handle.textContent = '\u22EE\u22EE';
    handle.title = 'Drag to reorder';

    if(m.isSubtitle){
      d.className='tl-subt';

      var labelSpan = document.createElement('span');
      labelSpan.className = 'tl-subt-text';
      labelSpan.textContent = m.text;

      var editBtn = document.createElement('button');
      editBtn.className = 'tl-subt-btn';
      editBtn.title = 'Rename section';
      editBtn.textContent = '\u270F\uFE0F';

      var delBtn = document.createElement('button');
      delBtn.className = 'tl-subt-btn';
      delBtn.title = 'Delete section';
      delBtn.textContent = '\u2715';
      delBtn.style.color = '#fca5a5';

      function startEdit() {
        d.innerHTML = '';
        d.classList.add('tl-subt-editrow');
        var inp = document.createElement('input');
        inp.className = 'tl-subt-inp'; inp.type = 'text'; inp.value = _tlMsgs[idx].text;
        var ok = document.createElement('button');
        ok.className = 'tl-subt-btn'; ok.textContent = '\u2713 Save';
        var cancel = document.createElement('button');
        cancel.className = 'tl-subt-btn'; cancel.textContent = 'Cancel';
        function commit() { var v=inp.value.trim(); if(v){_tlMsgs[idx].text=v;_tlDirtyMark();} _tlRender(); }
        ok.onclick=function(e){e.stopPropagation();commit();};
        cancel.onclick=function(e){e.stopPropagation();_tlRender();};
        inp.addEventListener('keydown',function(e){ if(e.key==='Enter'){e.preventDefault();commit();} if(e.key==='Escape'){_tlRender();} });
        d.appendChild(inp); d.appendChild(ok); d.appendChild(cancel);
        inp.focus(); inp.select();
      }
      editBtn.onclick=function(e){e.stopPropagation();startEdit();};
      delBtn.onclick=function(e){
        e.stopPropagation();
        if(confirm('Delete this section header?')){_tlMsgs.splice(idx,1);_tlDirtyMark();_tlRender();}
      };
      labelSpan.addEventListener('dblclick',function(e){e.stopPropagation();startEdit();});

      d.appendChild(handle); d.appendChild(labelSpan); d.appendChild(editBtn); d.appendChild(delBtn);
      _tlAddDragEvents(d, idx);
      return d;
    }

    // ── Regular message ────────────────────────────────────────────────────
    var c='tl-msg';
    if(m.isSubchat) c+=' tl-sub';
    if(m.isYellow)  c+=' tl-yl';
    if(m.isOrange)  c+=' tl-or';
    if(_tlSel.has(idx)) c+=' tl-sel';
    d.className=c;

    var tx=document.createElement('span'); tx.className='tl-mtext'; tx.textContent=m.text;
    tx.title='Double-click to edit';
    var ts=document.createElement('span'); ts.className='tl-mts';   ts.textContent=m.timestamp||'';
    d.appendChild(handle); d.appendChild(tx); d.appendChild(ts);

    // Inline edit function — replaces text span with a textarea
    function startMsgEdit() {
      if(d.querySelector('.tl-medit')) return; // already editing
      var ta=document.createElement('textarea');
      ta.className='tl-medit';
      ta.value=_tlMsgs[idx].text;
      ta.rows=1;
      // auto-size
      function resize(){ ta.style.height='auto'; ta.style.height=Math.min(ta.scrollHeight,200)+'px'; }
      ta.addEventListener('input', resize);
      tx.replaceWith(ta);
      ts.style.display='none';
      resize(); ta.focus();
      // move cursor to end
      ta.setSelectionRange(ta.value.length, ta.value.length);
      function commit() {
        var v=ta.value.trim();
        if(v && v!==_tlMsgs[idx].text){ _tlMsgs[idx].text=v; _tlDirtyMark(); }
        _tlRender();
      }
      ta.addEventListener('blur', function(){ setTimeout(commit,80); });
      ta.addEventListener('keydown', function(e){
        if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); commit(); }
        if(e.key==='Escape'){ e.preventDefault(); _tlRender(); }
      });
    }

    tx.addEventListener('dblclick', function(e){ e.stopPropagation(); startMsgEdit(); });

    var gear=document.createElement('button'); gear.className='tl-mgear'; gear.textContent='\u2699\uFE0F';
    var menu=document.createElement('div');   menu.className='tl-mmenu';
    function mk(lbl,fn,isDel){
      var b=document.createElement('button'); b.textContent=lbl;
      if(isDel) b.className='tl-del';
      b.onclick=function(e){ e.stopPropagation(); fn(); menu.style.display='none'; };
      menu.appendChild(b);
    }
    mk('\u270F Edit message', function(){ startMsgEdit(); });
    var sep0=document.createElement('div'); sep0.className='tl-msep'; menu.appendChild(sep0);
    mk(m.isYellow?'\u2713 Yellow (off)':'\u{1F7E1} Highlight yellow', function(){ _tlMsgs[idx].isYellow=!_tlMsgs[idx].isYellow; _tlMsgs[idx].isOrange=false; _tlDirtyMark(); _tlRender(); });
    mk(m.isOrange?'\u2713 Orange (off)':'\u{1F7E0} Highlight orange', function(){ _tlMsgs[idx].isOrange=!_tlMsgs[idx].isOrange; _tlMsgs[idx].isYellow=false; _tlDirtyMark(); _tlRender(); });
    mk(m.isSubchat?'\u21A9 Promote to main':'\u21B3 Make sub-thought', function(){ _tlMsgs[idx].isSubchat=!_tlMsgs[idx].isSubchat; _tlDirtyMark(); _tlRender(); });
    var sep=document.createElement('div'); sep.className='tl-msep'; menu.appendChild(sep);
    mk('\u2715 Delete', function(){ _tlMsgs.splice(idx,1); _tlDirtyMark(); _tlRender(); }, true);
    gear.onclick=function(e){
      e.stopPropagation();
      var v=menu.style.display==='block';
      document.querySelectorAll('.tl-mmenu').forEach(function(x){ x.style.display='none'; });
      if(!v) menu.style.display='block';
    };
    gear.appendChild(menu); d.appendChild(gear);

    d.addEventListener('click', function(e){
      if(!(e.ctrlKey||e.metaKey)) return; e.preventDefault();
      if(_tlSel.has(idx)){ _tlSel.delete(idx); d.classList.remove('tl-sel'); }
      else { _tlSel.add(idx); d.classList.add('tl-sel'); }
    });

    _tlAddDragEvents(d, idx);
    return d;
  }

  function _tlSend() {
    var inp=document.getElementById('tlTextInput'); if(!inp) return;
    var t=inp.value.trim(); if(!t) return;
    _tlMsgs.push({ text:t, timestamp:_tlTs(), isSubchat:false, isYellow:false, isOrange:false });
    inp.value=''; inp.style.height='auto';
    _tlDirtyMark(); _tlRender();
    _tlStat('Unsaved \u2014 click \u201CSave to Task\u201D when ready');
  }

  function _tlInsertSub(lbl) {
    if(!lbl || !lbl.trim()) return;
    _tlMsgs.push({ text:lbl, timestamp:_tlTs(), isSubtitle:true });
    document.getElementById('tlSubPicker').style.display='none';
    _tlDirtyMark(); _tlRender();
  }

  function _tlTogglePicker() {
    var p=document.getElementById('tlSubPicker'), b=document.getElementById('tlSubBtn');
    if(!p||!b) return;
    if(p.style.display==='block'){ p.style.display='none'; return; }
    // Show temporarily off-screen to measure height
    p.style.visibility='hidden'; p.style.display='block';
    var pickerH=p.offsetHeight;
    p.style.display='none'; p.style.visibility='';
    var r=b.getBoundingClientRect();
    var spaceBelow=window.innerHeight - r.bottom - 8;
    var spaceAbove=r.top - 8;
    if(spaceBelow >= pickerH || spaceBelow >= spaceAbove) {
      // open downward
      p.style.top=(r.bottom+4)+'px';
    } else {
      // flip upward
      p.style.top=(r.top - pickerH - 4)+'px';
    }
    p.style.left=r.left+'px'; p.style.display='block';
    setTimeout(function(){ var c=document.getElementById('tlCustomSub'); if(c) c.focus(); }, 60);
  }

  function _tlCopySel() {
    if(!_tlSel.size){ _tlStat('Ctrl-click messages to select them first'); return; }
    var lines=[..._tlSel].sort(function(a,b){return a-b;}).map(function(i){
      return (_tlMsgs[i].isSubchat?'  \u2022 ':'\u2022 ')+(_tlMsgs[i].text||'');
    });
    navigator.clipboard.writeText(lines.join('\n'))
      .then(function(){ _tlSel.clear(); _tlRender(); _tlStat('Copied '+lines.length+' message(s)',true); })
      .catch(function(){ _tlStat('Copy failed'); });
  }

  function _tlExport() {
    if(!_tlTask||!_tlMsgs.length){ _tlStat('Nothing to export yet'); return; }
    var title=_tlTask.title||'Task';
    var lines=['\u{1F4AC} Think Log \u2014 '+title, new Date().toLocaleString(), ''];
    _tlMsgs.forEach(function(m){
      if(m.isSubtitle){ lines.push('', m.text, ''); return; }
      var pre=m.isSubchat?'    \u2022 ':'\u2022 ';
      var hi=m.isYellow?'[\u2B50] ':m.isOrange?'[\u{1F525}] ':'';
      lines.push(pre+hi+(m.text||'')+' ('+(m.timestamp||'')+')');
    });
    var blob=new Blob([lines.join('\n')],{type:'text/plain'});
    var a=document.createElement('a'); a.href=URL.createObjectURL(blob);
    a.download='think_log_'+title.replace(/[^a-z0-9]/gi,'_').slice(0,40)+'.txt';
    a.click(); URL.revokeObjectURL(a.href);
    _tlStat('Exported',true);
  }

  function _tlClearAll() {
    if(!_tlMsgs.length) return;
    if(confirm('Clear all '+_tlMsgs.length+' entries?')) {
      _tlMsgs=[]; _tlSel.clear(); _tlDirtyMark(); _tlRender();
    }
  }

  function _tlFilter(q) {
    var ql=(q||'').toLowerCase();
    document.querySelectorAll('#tlChatBox .tl-msg, #tlChatBox .tl-subt').forEach(function(el){
      el.style.display=(!ql||el.textContent.toLowerCase().includes(ql))?'':'none';
    });
  }

  function _tlSaveToTask() {
    if(!_tlTask) return;
    DB.updateTask(_tlTask.id, { thinkLog: _tlMsgs });
    render();
    toast('Think Log saved \u2713', 'success');
    _tlDirty=false;
    var b=document.getElementById('tlSaveBtn');
    if(b){ b.textContent='\u2713 Saved!'; b.className='tl-savebtn saved'; }
    _tlStat('\u2713 Saved to task!', true);
    setTimeout(function(){ if(b){ b.textContent='\u{1F4BE} Save to Task'; b.className='tl-savebtn'; } }, 2500);
  }

  function _tlClose() {
    if(_tlDirty && _tlMsgs.length && !confirm('Close without saving?')) return;
    document.getElementById('tlOverlay').classList.remove('tl-open');
    _tlTask=null; _tlMsgs=[]; _tlSel=new Set(); _tlDirty=false;
  }

  function openThinkLog(task) {
    _tlTask  = task;
    _tlMsgs  = JSON.parse(JSON.stringify(task.thinkLog||[]));
    _tlSel   = new Set();
    _tlDirty = false;
    var chip=document.getElementById('tlChip');
    if(chip){ chip.textContent=task.title||'Task'; chip.title=task.title||''; }
    var sb=document.getElementById('tlSaveBtn');

    var panel=document.getElementById('tlPanel');
    panel.classList.remove('tl-minimized');
    // Centre panel in viewport on first open (if not already positioned by drag)
    if(!panel._tlPositioned) {
      panel._tlPositioned = true;
      var pw=panel.offsetWidth||680, ph=panel.offsetHeight||600;
      panel.style.left = Math.max(0, (window.innerWidth  - pw) / 2) + 'px';
      panel.style.top  = Math.max(0, (window.innerHeight - ph) / 2) + 'px';
    }
    _tlStat('Ready \u2014 click \u201CSave to Task\u201D to persist');

    document.getElementById('tlOverlay').classList.add('tl-open');

  function openSubtaskAddRow(task, li) {
    if (li.querySelector('.subtask-input-row')) return;
    // Ensure detail panel is open
    if (!detailOpenState.get(task.id) && !defaultDetailOpen) {
      detailOpenState.set(task.id, true);

    const cancelB = document.createElement('button'); cancelB.className = 'btn btn-ghost btn-sm'; cancelB.textContent = 'Cancel'; cancelB.style.flexShrink = '0';

  // ── Timer ─────────────────────────────────────────────────────────────────
  function fmtTime(s) { return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`; }

  function toggleTimer(id) {
    if (activeTimers.has(id)) {
      const { iv, startMs } = activeTimers.get(id);
      clearInterval(iv);
      const elapsed = Math.floor((Date.now() - startMs) / 1000);
      const t = DB.getTask(id);
      DB.updateTask(id, { timeSpentSeconds: (t?.timeSpentSeconds||0) + elapsed });
      activeTimers.delete(id);
      const disp = document.querySelector(`.timer-display[data-timer-id="${id}"]`);
      const btn  = document.querySelector(`[data-timer-btn="${id}"]`);
      if (disp) { disp.classList.remove('running'); disp.textContent = fmtTime(DB.getTask(id)?.timeSpentSeconds||0); }
      if (btn)  btn.innerHTML = '▶';
    } else {
      const startMs = Date.now();
      const base    = DB.getTask(id)?.timeSpentSeconds || 0;
      const iv = setInterval(() => {
        const disp = document.querySelector(`.timer-display[data-timer-id="${id}"]`);
        if (disp) disp.textContent = fmtTime(base + Math.floor((Date.now()-startMs)/1000));
      }, 500);
      activeTimers.set(id, { iv, startMs });
      const disp = document.querySelector(`.timer-display[data-timer-id="${id}"]`);
      const btn  = document.querySelector(`[data-timer-btn="${id}"]`);
      if (disp) disp.classList.add('running');
      if (btn)  btn.innerHTML = '⏸';
    }
  }

  // ── Kanban ────────────────────────────────────────────────────────────────
  let _dragId = null;
  function buildKanban(tasks) {
    return `<div class="kanban-board">${['todo','progress','review','done'].map(status => {
      const m = STATUS_META[status]; const ct = tasks.filter(t => t.status === status);
      return `<div class="kanban-col">
        <div class="kanban-col-header">
          <div class="kanban-col-dot" style="background:${m.dot}"></div>
          <div class="kanban-col-name">${m.label}</div>
          <div class="kanban-col-count">${ct.length}</div>
        </div>
        <div class="kanban-cards" id="kc_${status}" data-status="${status}"
          ondragover="APP.kanbanDragOver(event)" ondrop="APP.kanbanDrop(event,'${status}')"
          ondragenter="APP.kanbanDragEnter(event)" ondragleave="APP.kanbanDragLeave(event)">
          ${ct.map(t => buildKanbanCard(t)).join('')}
        </div>
        <button class="kanban-add-btn" data-action="kanban-add" data-status="${status}">+ Add task</button>
      </div>`;
    }).join('')}</div>`;
  }

  function buildKanbanCard(task) {
    const proj    = DB.getProjects().find(p => p.id === task.projectId);
    const projTag = proj && currentPage !== 'project'
      ? `<span class="task-project-tag" style="background:${projColor(proj.color)};font-size:0.65rem;padding:1px 5px">${escHtml(proj.name)}</span>` : '';
    const sub  = (task.subtasks||[]); const subStr = sub.length > 0 ? `<span style="font-size:0.68rem;color:var(--text-light)">☑ ${sub.filter(s=>s.completed).length}/${sub.length}</span>` : '';
    const note = task.note ? `<span style="font-size:0.68rem;color:var(--purple)">📝</span>` : '';

// Called by DB layer after every write
function scheduleAutoSync() {
  lastLocalSavedAt = Date.now();
  // Update sidebar status display (guard: element may not exist yet)
  if (document.getElementById('syncStatusMessage')) updateSyncStatus();
  if (!autoSyncEnabled || !fbUser) return;
  if (gdriveSyncTimer) clearTimeout(gdriveSyncTimer);
  gdriveSyncTimer = setTimeout(() => fbSaveAll(true), 2000);
}

function formatStamp(ts) {
  if (!ts) return 'Never';
  const d = new Date(ts);
  const pad = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
}

function updateSyncStatus() {
  const statusMsg   = document.getElementById('syncStatusMessage');
  const cloudSyncDot = document.getElementById('cloudSyncDot');
  const savedLine   = `💾 Local save: ${formatStamp(lastLocalSavedAt)}`;
  if (!statusMsg) return;
  if (!fbUser) {
    if (cloudSyncDot) cloudSyncDot.className = 'cloud-sync-indicator sync-off';
    statusMsg.innerHTML = savedLine + '<br>☁ Not signed in';
    return;
  }
  if (gdriveSyncing) {
    cloudSyncDot.className = 'cloud-sync-indicator sync-syncing';
    statusMsg.innerHTML = savedLine + '<br>☁ Syncing…';
  } else if (autoSyncEnabled) {
    cloudSyncDot.className = 'cloud-sync-indicator sync-ok';
    statusMsg.innerHTML = savedLine + `<br>☁ Cloud sync: ${formatStamp(gdriveLastSavedAt)}`;
  } else {
    cloudSyncDot.className = 'cloud-sync-indicator sync-off';
    statusMsg.innerHTML = savedLine + '<br>☁ Auto-sync off';
  }
}

function updateCloudUI(signedIn) {
  const notSignedIn   = document.getElementById('cloudNotSignedIn');
  const signedInDiv   = document.getElementById('cloudSignedIn');
  const statusText    = document.getElementById('cloudStatusText');
  const syncDot       = document.getElementById('cloudSyncDot');
  if (!notSignedIn) return;
  if (signedIn && fbUser) {
    notSignedIn.style.display = 'none';
    signedInDiv.style.display = 'block';
    statusText.textContent = fbUser.displayName?.split(' ')[0] || fbUser.email?.split('@')[0] || 'User';
    syncDot.className = 'cloud-sync-indicator sync-ok';
    document.getElementById('dropdownName').textContent  = fbUser.displayName || fbUser.email?.split('@')[0];
    document.getElementById('dropdownEmail').textContent = fbUser.email;
    document.getElementById('dropdownAvatar').textContent = (fbUser.displayName || fbUser.email)[0].toUpperCase();
  } else {
    notSignedIn.style.display = 'block';
    signedInDiv.style.display = 'none';
    statusText.textContent = 'Sign in';
    syncDot.className = 'cloud-sync-indicator sync-off';
  }
  updateSyncStatus();
}

function initFirebase() {
  if (!FIREBASE_CONFIG.apiKey) return false;
  try {
    fbApp  = firebase.initializeApp(FIREBASE_CONFIG);
    fbAuth = firebase.auth();
    fbDb   = firebase.firestore();
    fbAuth.onAuthStateChanged(user => {
      if (user) {
        fbUser = user;
        updateCloudUI(true);
        const saved = localStorage.getItem('qpm_autoSync_' + user.uid);
        autoSyncEnabled = saved === 'true';
        const toggle = document.getElementById('autoSyncToggle');
        if (toggle) toggle.checked = autoSyncEnabled;
        updateSyncStatus();
        if (autoSyncEnabled) fbLoadAll(true).then(() => startDrivePoll());
      } else {
        fbUser = null;
        updateCloudUI(false);
        stopDrivePoll();
      }
    });
    return true;
  } catch(e) { console.error('Firebase init error:', e); return false; }
}

// Export all localStorage data for this app into one object
function getLocalSnapshot() {
  return {
    projects: JSON.parse(localStorage.getItem('qpm_projects') || '[]'),
    tasks:    JSON.parse(localStorage.getItem('qpm_tasks')    || '[]'),
    updatedAt: Date.now(),
  };
}

// Restore a cloud snapshot back into localStorage and re-render
function applySnapshot(snap) {
  if (snap.projects) localStorage.setItem('qpm_projects', JSON.stringify(snap.projects));
  if (snap.tasks)    localStorage.setItem('qpm_tasks',    JSON.stringify(snap.tasks));
  if (typeof APP !== 'undefined') APP.navigate('dashboard');
}

async function fbSaveAll(silent = false) {
  if (!fbUser || !fbDb) { if (!silent) alert('Please sign in first'); return false; }
  if (gdriveSyncing) return false;
  gdriveSyncing = true; updateSyncStatus();
  try {
    const snap = getLocalSnapshot();
    await fbDb.collection('users').doc(fbUser.uid).set({ qpm_data: snap, qpm_updatedAt: Date.now() }, { merge: true });
    gdriveLastSavedAt = Date.now();
    gdriveSyncing = false; updateSyncStatus();
    if (!silent) { alert('Data saved to cloud successfully!'); }
    return true;
  } catch(e) {
    console.error(e); gdriveSyncing = false; updateSyncStatus();
    if (!silent) alert('Save failed: ' + e.message);
    return false;
  }
}

async function fbLoadAll(silent = false) {
  if (!fbUser || !fbDb) { if (!silent) alert('Please sign in first'); return false; }
  if (gdriveSyncing) return false;
  gdriveSyncing = true; if (!silent) updateSyncStatus();
  try {
    const docSnap = await fbDb.collection('users').doc(fbUser.uid).get();
    if (docSnap.exists) {
      const saved = docSnap.data().qpm_data;
      if (saved) {
        applySnapshot(saved);
        gdriveLastSavedAt = docSnap.data().qpm_updatedAt || Date.now();
        gdriveSyncing = false; updateSyncStatus();
        if (!silent) alert('Data loaded from cloud successfully!');
        return true;
      }
    } else {
      if (!silent) alert('No cloud data found.');
    }
  } catch(e) {
    console.error(e);
    if (!silent) alert('Load failed: ' + e.message);
  } finally { gdriveSyncing = false; updateSyncStatus(); }
  return false;
}

function startDrivePoll() {
  stopDrivePoll();
  gdrivePollInterval = setInterval(async () => {
    if (!autoSyncEnabled || !fbUser || gdriveSyncing || !fbDb) return;
    try {
      const docSnap = await fbDb.collection('users').doc(fbUser.uid).get();
      if (!docSnap.exists) return;
      const remote = docSnap.data().qpm_updatedAt || 0;
      if (remote > gdriveLastSavedAt + 5000) await fbLoadAll(true);
    } catch(e) { console.error('Poll error:', e); }
  }, 30000);
}

function stopDrivePoll() {
  if (gdrivePollInterval) { clearInterval(gdrivePollInterval); gdrivePollInterval = null; }
  if (gdriveSyncTimer)    { clearTimeout(gdriveSyncTimer);     gdriveSyncTimer    = null; }
}

function setupCloudUI() {
  // Suppress "outside click closes dropdown" briefly after popup auth returns,
  // because the popup close generates a synthetic body-click that would
  // immediately re-close the dropdown or interfere with auth state.
  let _suppressOutsideClose = false;

  document.body.addEventListener('click', async e => {
    // Always re-query so we never hold a stale reference to a detached element
    const toggleBtn = document.getElementById('cloudToggleBtn');
    const dropdown  = document.getElementById('cloudDropdown');
    if (!dropdown) return;

    // Toggle the dropdown open/closed
    if (toggleBtn && toggleBtn.contains(e.target)) {
      e.stopPropagation();
      dropdown.style.display = dropdown.style.display === 'block' ? 'none' : 'block';
      return;
    }

    // Close dropdown when clicking outside — but not right after a popup auth
    if (!dropdown.contains(e.target)) {
      if (!_suppressOutsideClose) dropdown.style.display = 'none';
      return;
    }

    // Sign in
    if (e.target.closest('#signInMenuItem')) {
      e.stopPropagation();
      if (!fbAuth) { alert('Firebase not ready'); return; }

      // Prevent re-entrant sign-in attempts
      if (window._qpmSigningIn) return;
      window._qpmSigningIn = true;

      const resetSignInUI = () => {
        window._qpmSigningIn = false;
        const el = document.getElementById('signInMenuItem');
        if (el) {
          el.innerHTML = '<span class="cloud-dropdown-icon">🔑</span>Sign in with Google';
          el.style.pointerEvents = '';
        }
      };

      // Show visual feedback
      const item = document.getElementById('signInMenuItem');
      if (item) {
        item.innerHTML = '<span class="cloud-dropdown-icon">⏳</span>Signing in…';
        item.style.pointerEvents = 'none';
      }

      // Timeout guard: reset UI if popup never resolves after 60s
      const timeoutId = setTimeout(() => {
        resetSignInUI();
        alert('Sign-in timed out. Please try again.');
      }, 60000);

      // Suppress outside-click dismissal while popup is open and for a short
      // window after it closes (popup close fires a synthetic body click)
      _suppressOutsideClose = true;

      try {
        const provider = new firebase.auth.GoogleAuthProvider();
        provider.setCustomParameters({ prompt: 'select_account' });
        await fbAuth.signInWithPopup(provider);
        clearTimeout(timeoutId);
        resetSignInUI();
        // Keep dropdown open so the user can see they're signed in;
        // onAuthStateChanged will call updateCloudUI which updates the panel.
        // Release suppression after a tick so the synthetic popup-close click
        // has already been swallowed.
        setTimeout(() => { _suppressOutsideClose = false; }, 300);
      } catch(err) {
        clearTimeout(timeoutId);
        resetSignInUI();
        _suppressOutsideClose = false;
        const silent = [
          'auth/popup-closed-by-user',
          'auth/cancelled-popup-request',
          'auth/user-cancelled',
        ];
        if (!silent.includes(err.code)) {
          if (err.code === 'auth/popup-blocked') {
            alert('Popup was blocked by your browser. Please allow popups for this site and try again.');
          } else {
            alert('Sign-in failed: ' + err.message);
          }
        }
      }
      return;
    }

    // Sign out
    if (e.target.closest('#signOutMenuItem')) {
      e.stopPropagation();
      autoSyncEnabled = false;
      stopDrivePoll();
      if (fbAuth) await fbAuth.signOut();
      // fbUser will be cleared by onAuthStateChanged; update UI immediately
      fbUser = null;
      updateCloudUI(false);
      document.getElementById('cloudDropdown').style.display = 'none';
      return;
    }

    // Save to cloud
    if (e.target.closest('#saveNowMenuItem')) {
      e.stopPropagation();
      if (fbUser) { await fbSaveAll(false); } else alert('Please sign in first');
      const dd2 = document.getElementById('cloudDropdown');
      if (dd2) dd2.style.display = 'none';
      return;
    }

    // Load from cloud
    if (e.target.closest('#loadNowMenuItem')) {
      e.stopPropagation();
      if (fbUser) { await fbLoadAll(false); } else alert('Please sign in first');
      const dd3 = document.getElementById('cloudDropdown');
      if (dd3) dd3.style.display = 'none';
      return;
    }

    // Auto-sync toggle row click (but not the checkbox itself — let its change handler fire)
    if (e.target.closest('#autoSyncItem') && e.target.type !== 'checkbox') {
      e.stopPropagation();
      const cb = document.getElementById('autoSyncToggle');
      if (cb) { cb.checked = !cb.checked; cb.dispatchEvent(new Event('change')); }
      return;
    }
  });

  // Auto-sync checkbox — delegated so it works after sidebar re-renders
  document.body.addEventListener('change', e => {
    if (e.target.id === 'autoSyncToggle') {
      autoSyncEnabled = e.target.checked;
      if (fbUser) {
        localStorage.setItem('qpm_autoSync_' + fbUser.uid, String(autoSyncEnabled));
        if (autoSyncEnabled) { fbLoadAll(true).then(() => startDrivePoll()); }
        else stopDrivePoll();
      }
      updateSyncStatus();
    }
  });
}

// Boot the sync system after DOM is ready
document.addEventListener('DOMContentLoaded', () => {
  initFirebase();
  setupCloudUI();
});


</script>
</body>
